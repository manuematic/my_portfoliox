<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <defs>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.8"/>
    </filter>
  </defs>
  <!-- Geblurtes M im Hintergrund -->
  <text x="12" y="21" font-family="Georgia, serif" font-size="26" font-weight="900"
        text-anchor="middle" fill="#3b82f6" opacity="0.30" filter="url(#blur)">M</text>
  <!-- Scharfes M -->
  <text x="12" y="21" font-family="Georgia, serif" font-size="26" font-weight="900"
        text-anchor="middle" fill="#2563eb" opacity="0.20">M</text>
  <!-- "PORTFOLIO" – kleiner, kompakter -->
  <text x="12" y="20.8" font-family="Arial, sans-serif" font-size="2.6" font-weight="700"
        text-anchor="middle" fill="#1d4ed8" opacity="1" letter-spacing="0.5">PORTFOLIO</text>
</svg>
